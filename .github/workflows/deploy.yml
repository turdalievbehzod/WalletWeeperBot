name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /root/WalletWeeperBot

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Rebuilding frontend..."
            cd frontend
            chmod +x node_modules/.bin/vite
            npm run build
            cd ..

            echo "==> Restarting frontend server..."
            kill $(lsof -t -i :3000) 2>/dev/null || true
            sleep 1
            setsid nohup serve -s frontend/dist -p 3000 > /root/serve.log 2>&1 &
            disown $!

            echo "==> Restarting Django..."
            docker compose up -d web

            echo "==> Restarting bot..."
            if [ -f /root/bot.pid ]; then
              kill $(cat /root/bot.pid) 2>/dev/null || true
              rm /root/bot.pid
            fi
            sleep 2
            cd bot
            setsid nohup venv/bin/python main.py > /root/bot.log 2>&1 &
            echo $! > /root/bot.pid
            disown $!

            echo "==> Deploy complete!"
