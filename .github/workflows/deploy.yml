name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /root/WalletWeeperBot

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Rebuilding frontend..."
            cd frontend
            npm run build
            cd ..

            echo "==> Restarting frontend server..."
            pkill -f "serve -s" || true
            sleep 1
            nohup serve -s frontend/dist -p 3000 > /root/serve.log 2>&1 &

            echo "==> Restarting Django..."
            docker compose up -d web

            echo "==> Restarting bot..."
            pkill -f "venv/bin/python main.py" || true
            sleep 2
            cd bot
            nohup venv/bin/python main.py > /root/bot.log 2>&1 &

            echo "==> Deploy complete!"
